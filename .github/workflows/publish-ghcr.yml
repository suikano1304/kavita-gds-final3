name: Publish GHCR image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-ghcr.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kavita-gds
  IMAGE_TAG: 0.9.0.2-5
  RELEASE_ASSET_URL: https://github.com/suikano1304/Kavita-GDS/releases/download/v0.9.0.2-5/kavita-gds.tar.gz
  RELEASE_ASSET_SHA256: 64d6de0d1f384e80fa5c0fc97e00c231d990f1d54cb6c26c300e076b7445c714
  OCI_ARCHIVE_PATH: kavita-gds/docker-image/kavita-gds.oci.tar

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Download release package
        run: |
          curl -L -o kavita-gds.tar.gz "$RELEASE_ASSET_URL"
          echo "$RELEASE_ASSET_SHA256  kavita-gds.tar.gz" | sha256sum -c -
          tar -xzf kavita-gds.tar.gz

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish version tag
        run: |
          skopeo copy --all \
            "oci-archive:${OCI_ARCHIVE_PATH}" \
            "docker://${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Publish latest tag
        run: |
          skopeo copy --all \
            "oci-archive:${OCI_ARCHIVE_PATH}" \
            "docker://${IMAGE_NAME}:latest"
