name: Publish GHCR image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kavita-gds
  IMAGE_TAG: 9.0.6-1
  RELEASE_ASSET_URL: https://github.com/suikano1304/Kavita-GDS/releases/download/v9.0.6-1/kavita-gds.tar.gz
  RELEASE_ASSET_SHA256: db9efbde7fb0ca93f3fc9c9e40df4610890acd484508bfa614387c984ae5a741
  DOCKER_ARCHIVE_PATH: kavita-gds/docker-image/kavita-gds.docker.tar

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Download release package
        run: |
          curl -L -o kavita-gds.tar.gz "$RELEASE_ASSET_URL"
          echo "$RELEASE_ASSET_SHA256  kavita-gds.tar.gz" | sha256sum -c -
          tar -xzf kavita-gds.tar.gz

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish version tag
        run: |
          skopeo --tmpdir "$RUNNER_TEMP" copy --all \
            "docker-archive:${DOCKER_ARCHIVE_PATH}:local/kavita-gds:${IMAGE_TAG}" \
            "docker://${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Publish latest tag
        run: |
          skopeo --tmpdir "$RUNNER_TEMP" copy --all \
            "docker-archive:${DOCKER_ARCHIVE_PATH}:local/kavita-gds:latest" \
            "docker://${IMAGE_NAME}:latest"
